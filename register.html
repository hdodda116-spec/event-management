<html>
<head>
<meta charset="UTF-8">
<title>Register | SEVEN'S EVENTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:'Poppins',sans-serif}
/* ================= BODY ================= */
body{
    min-height:100vh;
    background: radial-gradient(circle at top,#1a1a2e,#0f3460);
    padding-top:95px;
    color:#fff;
}
/* ================= NAVBAR (SAME AS INDEX) ================= */
.custom-navbar{
    background: rgba(15,32,39,.85);
    backdrop-filter: blur(14px);
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    transition:.4s;
}
.custom-navbar.scrolled{
    background: rgba(10,20,30,.95);
    padding-top:5px;
    padding-bottom:5px;
}
.brand-logo{
    font-size:1.5rem;
    font-weight:700;
    color:#fff !important;
}
.brand-logo span{color:#00f5d4}
.nav-link{
    position:relative;
    color:#fff !important;
    font-weight:500;
}
.nav-link::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:0%;
    height:2px;
    background:linear-gradient(90deg,#00f5d4,#3a86ff);
    transition:.35s;
}
.nav-link:hover::after,
.nav-link.active::after{width:100%}
.nav-link.active{color:#00f5d4 !important}
.highlight-link{
    padding:8px 18px !important;
    border-radius:20px;
    background:linear-gradient(135deg,#00f5d4,#3a86ff);
    color:#000 !important;
    font-weight:600;
}
.highlight-link::after{display:none}
.highlight-link:hover{transform:scale(1.08)}
.admin-link{opacity:.75}
.admin-link:hover{opacity:1}
.navbar-toggler{border:none}
.navbar-toggler:focus{box-shadow:none}
/* ================= FORM CARD ================= */
.register-wrapper{
    max-width:620px;
    margin:auto;
    animation:fadeUp 1s ease forwards;
    opacity:0;
}
@keyframes fadeUp{
    from{opacity:0;transform:translateY(40px)}
    to{opacity:1;transform:translateY(0)}
}
.register-card{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    border-radius:24px;
    padding:40px;
    box-shadow:0 30px 60px rgba(0,0,0,.45);
}
/* HEADINGS */
.register-title{
    font-weight:700;
    text-align:center;
}
.register-subtitle{
    text-align:center;
    opacity:.85;
    font-size:.95rem;
    margin-bottom:25px;
}
/* INPUTS */
.form-floating>.form-control,
.form-floating>.form-select{
    border-radius:14px;
}
.form-control:focus,
.form-select:focus{
    border-color:#3a86ff;
    box-shadow:0 0 0 .15rem rgba(58,134,255,.25);
}
/* BUTTON */
.submit-btn{
    margin-top:15px;
    padding:12px;
    border-radius:30px;
    font-weight:600;
    background:linear-gradient(135deg,#3a86ff,#00f5d4);
    border:none;
    color:#000;
    transition:.4s;
}
.submit-btn:hover{
    transform:translateY(-3px) scale(1.04);
    box-shadow:0 15px 30px rgba(0,0,0,.3);
}
/* SUCCESS */
.success-msg{
    display:none;
    text-align:center;
    font-weight:600;
    color:#00f5d4;
    margin-top:15px;
    animation:pop .5s ease forwards;
}
@keyframes pop{
    from{transform:scale(.8);opacity:0}
    to{transform:scale(1);opacity:1}
}
/* BACK */
.back-link{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#00f5d4;
}
.back-link:hover{text-decoration:underline}
</style>
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top custom-navbar" id="navbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand brand-logo" href="index.html">
            SEVEN<span>'</span>S EVENTS
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link highlight-link active" href="events.html">Register</a></li>
                <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
                <li class="nav-item"><a class="nav-link admin-link" href="admin.html">Admin</a></li>
            </ul>
        </div>
    </div>
</nav>
<!-- FORM -->
<div class="container">
    <div class="register-wrapper">
        <div class="register-card">
            <h2 class="register-title">Event Registration</h2>
            <p class="register-subtitle">Secure your seat for an unforgettable experience ✨</p>
            <form id="registrationForm">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="name" placeholder="Full Name" required>
                    <label>Full Name</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="Email" required>
                    <label>Email Address</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="tel" class="form-control" id="phone" placeholder="Phone" required>
                    <label>Phone Number</label>
                </div>
                <div class="form-floating mb-3">
                    <select id="eventSelect" class="form-select" required>
                        <option disabled selected>Select Event</option>
                        <option>Candle Making – 12 Jan 2026</option>
                        <option>Cultural Event – 18 Jan 2026</option>
                        <option>Hackathon – 25 Jan 2026</option>
                        <option>Web Development Workshop – 02 Feb 2026</option>
                        <option>Foundation Day – 10 Feb 2026</option>
                    </select>
                    <label>Selected Event</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" placeholder="College / Organization">
                    <label>College / Organization</label>
                </div>
                <button class="submit-btn w-100" type="submit">
                    Confirm Registration
                </button>
                <div class="success-msg" id="successMsg">
                    ✅ Registration Successful!
                </div>
                <a href="events.html" class="back-link">← Back to Events</a>
            </form>
        </div>
    </div>
</div>
<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* NAVBAR SCROLL */
const navbar = document.getElementById("navbar");
window.addEventListener("scroll", () => {
    navbar.classList.toggle("scrolled", window.scrollY > 50);
});
/* REGISTER FORM SUBMIT */
document.getElementById("registrationForm").addEventListener("submit", function(e){
    e.preventDefault();
    const registration = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        event: document.getElementById("eventSelect").value,
        college: document.querySelector('input[placeholder="College / Organization"]').value,
        time: new Date().toLocaleString()
    };
    // get old data or empty array
    let registrations = JSON.parse(localStorage.getItem("registrations")) || [];
    // add new user
    registrations.push(registration);
    // save back
    localStorage.setItem("registrations", JSON.stringify(registrations));
    // redirect
    window.location.href = "success.html";
});
</script>
</body>
</html>
