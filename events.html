<html>
<head>
<meta charset="UTF-8">
<title>Events | SEVEN'S EVENTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Bootstrap + Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:'Poppins',sans-serif}
/* ================= BODY ================= */
body{
    min-height:100vh;
    background:radial-gradient(circle at top,#1a1a2e,#0f3460);
    padding-top:95px;
    color:#fff;
}
/* ================= NAVBAR (SAME AS INDEX) ================= */
.custom-navbar{
    background:rgba(15,32,39,.85);
    backdrop-filter:blur(14px);
    box-shadow:0 10px 30px rgba(0,0,0,.35);
    transition:.4s;
}
.custom-navbar.scrolled{
    background:rgba(10,20,30,.95);
    padding-top:5px;
    padding-bottom:5px;
}
.brand-logo{
    font-size:1.5rem;
    font-weight:700;
    color:#fff !important;
}
.brand-logo span{color:#00f5d4}
.nav-link{
    position:relative;
    color:#fff !important;
    font-weight:500;
}
.nav-link::after{
    content:"";
    position:absolute;
    left:0;
    bottom:0;
    width:0%;
    height:2px;
    background:linear-gradient(90deg,#00f5d4,#3a86ff);
    transition:.35s;
}
.nav-link:hover::after,
.nav-link.active::after{width:100%}
.nav-link.active{color:#00f5d4 !important}
.highlight-link{
    padding:8px 18px !important;
    border-radius:20px;
    background:linear-gradient(135deg,#00f5d4,#3a86ff);
    color:#000 !important;
    font-weight:600;
}
.highlight-link::after{display:none}
.highlight-link:hover{transform:scale(1.08)}
.admin-link{opacity:.75}
.admin-link:hover{opacity:1}
.navbar-toggler{border:none}
.navbar-toggler:focus{box-shadow:none}
/* ================= HERO ================= */
.hero{
    text-align:center;
    margin-bottom:60px;
    animation:fadeDown 1s ease forwards;
}
@keyframes fadeDown{
    from{opacity:0;transform:translateY(-30px)}
    to{opacity:1;transform:translateY(0)}
}
.hero h1{
    font-weight:700;
}
.hero p{
    opacity:.85;
    max-width:600px;
    margin:auto;
}
/* ================= EVENT GRID ================= */
.event-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:35px;
}
/* ================= EVENT CARD ================= */
.event-card{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border-radius:24px;
    overflow:hidden;
    transition:.5s;
    box-shadow:0 20px 40px rgba(0,0,0,.45);
    opacity:0;
    transform:translateY(40px);
}
.event-card.show{
    opacity:1;
    transform:translateY(0);
}
.event-card:hover{
    transform:translateY(-18px) scale(1.04);
    box-shadow:0 35px 70px rgba(0,0,0,.65);
}
/* IMAGE */
.event-card img{
    width:100%;
    height:230px;
    object-fit:cover;
}
/* CONTENT */
.event-content{
    padding:22px;
}
.event-icon{
    font-size:42px;
    color:#00f5d4;
}
.event-title{
    font-size:1.3rem;
    font-weight:600;
    margin-top:10px;
}
.event-date{
    font-size:.9rem;
    opacity:.8;
}
/* BUTTON */
.event-btn{
    margin-top:18px;
    padding:10px;
    border-radius:30px;
    text-align:center;
    display:block;
    background:linear-gradient(135deg,#00f5d4,#3a86ff);
    color:#000;
    font-weight:600;
    text-decoration:none;
    transition:.4s;
}
.event-btn:hover{
    transform:scale(1.08);
    box-shadow:0 10px 25px rgba(0,0,0,.35);
}
</style>
</head>
<body>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top custom-navbar" id="navbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand brand-logo" href="index.html">
            SEVEN<span>'</span>S EVENTS
        </a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link highlight-link active" href="events.html">Register</a></li>
                <li class="nav-item"><a class="nav-link" href="feedback.html">Feedback</a></li>
                <li class="nav-item"><a class="nav-link admin-link" href="admin.html">Admin</a></li>
            </ul>
        </div>
    </div>
</nav>
<!-- HERO -->
<div class="container hero">
    <h1>✨ Discover Our Events</h1>
    <p>Choose an event, explore details, and register seamlessly for an unforgettable experience.</p>
</div>
<!-- EVENTS -->
<div class="container mb-5">
    <div id="eventGrid" class="event-grid"></div>
</div>
<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* NAVBAR SCROLL */
const navbar=document.getElementById("navbar");
window.addEventListener("scroll",()=>navbar.classList.toggle("scrolled",window.scrollY>50));
/* EVENTS DATA */
const events=[
 {title:"Candle Making",date:"12 Jan 2026",icon:"bi-lightbulb",image:"https://images.pexels.com/photos/4792733/pexels-photo-4792733.jpeg",desc:"Craft artistic handmade candles."},
 {title:"Cultural Event",date:"18 Jan 2026",icon:"bi-music-note-beamed",image:"https://images.pexels.com/photos/167636/pexels-photo-167636.jpeg",desc:"Music, dance & celebration."},
 {title:"Hackathon",date:"25 Jan 2026",icon:"bi-laptop",image:"https://images.pexels.com/photos/3861969/pexels-photo-3861969.jpeg",desc:"24-hour coding marathon."},
 {title:"Web Development Workshop",date:"02 Feb 2026",icon:"bi-code-slash",image:"https://images.pexels.com/photos/270404/pexels-photo-270404.jpeg",desc:"Hands-on web development."},
 {title:"Foundation Day",date:"10 Feb 2026",icon:"bi-building",image:"https://images.pexels.com/photos/3184292/pexels-photo-3184292.jpeg",desc:"Annual grand celebration."}
];
const grid=document.getElementById("eventGrid");
events.forEach((e,i)=>{
    const card=document.createElement("div");
    card.className="event-card";
    card.innerHTML=`
        <img src="${e.image}">
        <div class="event-content">
            <div class="event-icon"><i class="bi ${e.icon}"></i></div>
            <div class="event-title">${e.title}</div>
            <div class="event-date">${e.date}</div>
            <p class="mt-2">${e.desc}</p>
            <a class="event-btn"
               href="register.html?event=${encodeURIComponent(e.title+" – "+e.date)}">
               Register Now
            </a>
        </div>`;
    grid.appendChild(card);
    setTimeout(()=>card.classList.add("show"),i*150);
});
</script>
</body>
</html>
