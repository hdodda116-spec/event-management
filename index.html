<html> 
<head>
<meta charset="UTF-8">
<title>SEVEN'S EVENTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
/* GLOBAL */
* {
    font-family: 'Poppins', sans-serif;
}
/* BODY + BACKGROUND */
body {
    min-height: 200vh;
    padding-top: 90px;
    background:
        linear-gradient(
            rgba(15, 32, 39, 0.75),
            rgba(15, 32, 39, 0.85)
        ),
        url("https://images.unsplash.com/photo-1492684223066-81342ee5ff30");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    animation: bgFade 1.2s ease forwards;
}
/* FADE IN */
@keyframes bgFade {
    from {
        opacity: 0;
        transform: scale(1.03);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}
/* GLOW OVERLAY */
.bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
        radial-gradient(circle at 20% 30%, rgba(0,245,212,0.15), transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(58,134,255,0.18), transparent 45%);
    animation: glowMove 14s ease-in-out infinite alternate;
    z-index: -1;
}
@keyframes glowMove {
    from { transform: translateY(0); }
    to { transform: translateY(-60px); }
}
/* NAVBAR */
.custom-navbar {
    background: rgba(15, 32, 39, 0.85);
    backdrop-filter: blur(14px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    transition: all 0.4s ease;
}
.custom-navbar.scrolled {
    padding-top: 5px;
    padding-bottom: 5px;
    background: rgba(10, 20, 30, 0.95);
}
/* BRAND */
.brand-logo {
    font-size: 1.5rem;
    letter-spacing: 1px;
    color: #fff !important;
}
.brand-logo span {
    color: #00f5d4;
}
/* LINKS */
.nav-link {
    position: relative;
    font-weight: 500;
    color: #ffffff !important;
    padding: 8px 6px;
    transition: color 0.3s ease;
}
.nav-link::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    left: 0;
    bottom: 0;
    background: linear-gradient(90deg, #00f5d4, #3a86ff);
    transition: width 0.35s ease;
}
.nav-link:hover::after {
    width: 100%;
}
.nav-link.active {
    color: #00f5d4 !important;
}
.nav-link.active::after {
    width: 100%;
}
/* REGISTER BUTTON */
.highlight-link {
    padding: 8px 18px !important;
    border-radius: 20px;
    background: linear-gradient(135deg, #00f5d4, #3a86ff);
    color: #000 !important;
    font-weight: 600;
    transition: all 0.3s ease;
}
.highlight-link::after {
    display: none;
}
.highlight-link:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}
/* ADMIN */
.admin-link {
    opacity: 0.75;
}
.admin-link:hover {
    opacity: 1;
}
/* HERO */
.hero {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: #fff;
}
.hero h1 {
    font-size: 3rem;
    font-weight: 700;
    animation: heroFade 1s ease forwards;
}
.hero p {
    font-size: 1.2rem;
    opacity: 0.85;
}
@keyframes heroFade {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>
<body>
<!-- BACKGROUND GLOW -->
<div class="bg-glow"></div>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg fixed-top custom-navbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand fw-bold brand-logo" href="index.html">
            SEVEN<span>'</span>S EVENTS
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-3">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link highlight-link" href="events.html">Register</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="feedback.html">Feedback</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link admin-link" href="admin.html">Admin</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<!-- HERO -->
<section class="hero">
    <div>
        <h1>Welcome to SEVEN'S EVENTS</h1>
        <p class="mt-3">Where Moments Become Memories ✨</p>
    </div>
</section>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- NAVBAR SCROLL EFFECT -->
<script>
window.addEventListener("scroll", () => {
    const navbar = document.querySelector(".custom-navbar");
    navbar.classList.toggle("scrolled", window.scrollY > 50);
});
</script>
</body>
</html>
