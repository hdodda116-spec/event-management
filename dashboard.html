<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard | SEVEN'S EVENTS</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{ font-family:'Poppins',sans-serif; }
body{
    background:#f4f6f9;
    padding:40px;
}
.dashboard-card{
    background:#fff;
    border-radius:20px;
    padding:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
}
.logout-btn{
    border-radius:20px;
}
</style>
</head>
<body>
<script>
/* PROTECT DASHBOARD */
if(localStorage.getItem("isAdminLoggedIn") !== "true"){
    window.location.href = "admin.html";
}
</script>
<div class="container">
    <div class="dashboard-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>📋 Event Registrations</h3>
            <button class="btn btn-danger logout-btn" onclick="logout()">Logout</button>
        </div>
        <div class="table-responsive">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Event</th>
                        <th>Registered Time</th>
                    </tr>
                </thead>
                <tbody id="registrationData">
                </tbody>
            </table>
        </div>
    </div>
</div>
<script>
const tableBody = document.getElementById("registrationData");
const registrations = JSON.parse(localStorage.getItem("registrations")) || [];
if(registrations.length === 0){
    tableBody.innerHTML = `
        <tr>
            <td colspan="4" class="text-center">No registrations found</td>
        </tr>
    `;
} else {
    registrations.forEach((r, index) => {
        tableBody.innerHTML += `
            <tr>
                <td>${index + 1}</td>
                <td>${r.name}</td>
                <td>${r.event}</td>
                <td>${r.time}</td>
            </tr>
        `;
    });
}
function logout(){
    localStorage.removeItem("isAdminLoggedIn");
    window.location.href = "admin.html";
}
</script>
</body>
</html>
